<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aki Family | Yue CHEN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">CY Type｜虫鱼爬字</a>
    <nav><a href="yourong.html">Previous</a><a href="shanghai-sky.html">Next</a></nav>
  </header>
  <main>
    <section class="project-hero-image project-hero-awarded">
      <img src="assets/headers/aki-header.jpg" alt="Aki Family header specimen" decoding="async">
      <aside class="award-corner award-corner-aki" tabindex="0" aria-label="Aki Family awards">
        <svg class="award-corner-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 4h8v3.2c0 3.4-1.6 5.6-4 6.3-2.4-.7-4-2.9-4-6.3V4Z"></path>
          <path d="M8 6H4.8c0 2.5 1.3 4.3 3.5 4.8"></path>
          <path d="M16 6h3.2c0 2.5-1.3 4.3-3.5 4.8"></path>
          <path d="M12 13.5V17"></path>
          <path d="M8.5 20h7"></path>
          <path d="M10 17h4"></path>
        </svg>
        <div class="award-corner-content">
          <img class="award-expanded-image" src="assets/awards/aki-awards-expanded.png" alt="Aki Family award logos" decoding="async" loading="lazy">
        </div>
      </aside>
    </section>
    <section class="meta-grid">
      <div><span>Scripts</span><strong>Yi, Hanzi, Latin, Arabic</strong></div>
      <div><span>Award</span><strong>New York TDC x Young Ones 2025</strong></div>
      <div><span>Foundry</span><strong>Not available yet</strong></div>
      <div><span>Designers</span><strong>Yue CHEN, Congyu ZHANG</strong></div>
      <div><span>Period</span><strong>October 2023 to present</strong></div>
    </section>
    <section class="tester" data-font-tester>
      <div class="tester-panel">
        <h2>Type tester</h2>
        <div class="tester-controls">
          <label>Style<select data-tester-font><option value="font-aki-roman">Roman</option><option value="font-aki-italic">Italic</option></select></label>
          <label class="range-control"><span class="range-name">Size</span><input data-tester-size type="range" min="24" max="180" value="112"><input class="range-value" data-size-value type="number" min="24" max="180" value="112" aria-label="Size value"></label>
          <label class="range-control"><span class="range-name">Line height</span><input data-tester-line type="range" min="80" max="180" value="105"><input class="range-value" data-line-value type="number" min="0.8" max="1.8" step="0.01" value="1.05" aria-label="Line height value"></label>
          <div class="segmented" data-align-controls>
            <button type="button" data-align="left" class="active" aria-label="Align left"><span class="align-icon align-left"><i></i><i></i><i></i></span></button>
            <button type="button" data-align="center" aria-label="Align center"><span class="align-icon align-center"><i></i><i></i><i></i></span></button>
            <button type="button" data-align="right" aria-label="Align right"><span class="align-icon align-right"><i></i><i></i><i></i></span></button>
          </div>
          <label class="toggle"><input type="checkbox" data-invert> Reverse</label>
        </div>
      </div>
      <div class="tester-output"><div class="tester-text font-aki-roman" data-tester-output contenteditable="true">aki family</div></div>
    </section>
    <section class="image-grid">
      <img src="assets/details/aki-01.jpg" alt="Aki Family detailed specimen 1" decoding="async" loading="lazy">
      <img src="assets/details/aki-02.jpg" alt="Aki Family detailed specimen 2" decoding="async" loading="lazy">
    </section>
    <section class="pager">
      <a href="yourong.html">Previous: Yourong Type</a>
      <a href="shanghai-sky.html">Next: Shanghai Sky</a>
    </section>
  </main>
  <script src="tester.js"></script>
</body>
</html>
