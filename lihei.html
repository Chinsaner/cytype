<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youran Lihei | Yue CHEN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">CY Fonts｜虫鱼爬字</a>
    <nav><a href="aki.html">Previous</a><a href="shanghai-sky.html">Next</a></nav>
  </header>
  <main>
    <section class="project-hero-image">
      <img src="assets/headers/youran-lihei-header.jpg" alt="Youran Lihei header specimen">
    </section>
    <section class="meta-grid">
      <div><span>Scripts</span><strong>Hanzi, Yi, Latin</strong></div>
      <div><span>Award</span><strong>The 15th Hiiibrand Awards Most Popular Award 2025</strong></div>
      <div><span>Foundry</span><strong>Hanyi fonts</strong></div>
      <div><span>Designers</span><strong>Congyu ZHANG, Yue CHEN</strong></div>
      <div><span>Period</span><strong>July 2024 to present</strong></div>
    </section>
    <section class="tester" data-font-tester>
      <div class="tester-panel">
        <h2>Type tester</h2>
        <div class="tester-controls">
          <label>Style<select data-tester-font><option value="font-lihei">SemiBold</option></select></label>
          <label class="range-control"><span class="range-name">Size</span><input data-tester-size type="range" min="24" max="180" value="104"><input class="range-value" data-size-value type="number" min="24" max="180" value="104" aria-label="Size value"></label>
          <label class="range-control"><span class="range-name">Line height</span><input data-tester-line type="range" min="80" max="180" value="105"><input class="range-value" data-line-value type="number" min="0.8" max="1.8" step="0.01" value="1.05" aria-label="Line height value"></label>
          <div class="segmented" data-align-controls>
            <button type="button" data-align="left" class="active" aria-label="Align left"><span class="align-icon align-left"><i></i><i></i><i></i></span></button>
            <button type="button" data-align="center" aria-label="Align center"><span class="align-icon align-center"><i></i><i></i><i></i></span></button>
            <button type="button" data-align="right" aria-label="Align right"><span class="align-icon align-right"><i></i><i></i><i></i></span></button>
          </div>
          <label class="toggle"><input type="checkbox" data-invert> Reverse</label>
        </div>
      </div>
      <div class="tester-output"><div class="tester-text font-lihei" data-tester-output contenteditable="true">悠然隶黑标题字</div></div>
    </section>
    <section class="image-grid">
      <img src="assets/details/lihei-01.jpg" alt="Youran Lihei detailed specimen 1">
      <img src="assets/details/lihei-02.jpg" alt="Youran Lihei detailed specimen 2">
    </section>
    <section class="pager">
      <a href="aki.html">Previous: Aki Family</a>
      <a href="shanghai-sky.html">Next: Shanghai Sky</a>
    </section>
  </main>
  <script src="tester.js"></script>
</body>
</html>
